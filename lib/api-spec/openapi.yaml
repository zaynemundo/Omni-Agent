openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Chatbot API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openrouter
    description: OpenRouter AI chat operations
  - name: search
    description: Web search agent operations
  - name: backtesting
    description: Trading strategy backtesting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /openrouter/conversations:
    get:
      operationId: listOpenrouterConversations
      tags: [openrouter]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenrouterConversation"
    post:
      operationId: createOpenrouterConversation
      tags: [openrouter]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenrouterConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenrouterConversation"

  /openrouter/conversations/{id}:
    get:
      operationId: getOpenrouterConversation
      tags: [openrouter]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenrouterConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenrouterError"
    delete:
      operationId: deleteOpenrouterConversation
      tags: [openrouter]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenrouterError"
    patch:
      operationId: renameOpenrouterConversation
      tags: [openrouter]
      summary: Rename a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenrouterConversationInput"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenrouterConversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenrouterError"

  /openrouter/conversations/{id}/messages:
    get:
      operationId: listOpenrouterMessages
      tags: [openrouter]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenrouterMessage"
    post:
      operationId: sendOpenrouterMessage
      tags: [openrouter]
      summary: Send a message (dual-agent SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenrouterMessageInput"
      responses:
        "200":
          description: SSE stream with dual-agent phases
          content:
            text/event-stream: {}

  /openrouter/models:
    get:
      operationId: listOpenrouterModels
      tags: [openrouter]
      summary: List available AI models
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiModel"

  /search/web:
    post:
      operationId: searchWeb
      tags: [search]
      summary: Search the web via DuckDuckGo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebSearchInput"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSearchResult"

  /search/fetch:
    post:
      operationId: fetchPage
      tags: [search]
      summary: Fetch and extract text content from a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchPageInput"
      responses:
        "200":
          description: Page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchPageResult"

  /backtesting/run:
    post:
      operationId: runBacktest
      tags: [backtesting]
      summary: Run a trading strategy backtest simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestInput"
      responses:
        "200":
          description: Backtest results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OpenrouterConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenrouterMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        model:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - model
        - createdAt

    OpenrouterConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    OpenrouterMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenrouterConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenrouterMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenrouterError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AiModel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        isFree:
          type: boolean
      required:
        - id
        - name
        - description
        - isFree

    WebSearchInput:
      type: object
      properties:
        query:
          type: string
        maxResults:
          type: integer
      required:
        - query

    WebSearchResult:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"
      required:
        - query
        - results

    SearchResultItem:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        snippet:
          type: string
      required:
        - title
        - url
        - snippet

    FetchPageInput:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    FetchPageResult:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        content:
          type: string
      required:
        - url
        - title
        - content

    BacktestInput:
      type: object
      properties:
        symbol:
          type: string
        strategy:
          type: string
        initialBalance:
          type: number
        lotSize:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        fastPeriod:
          type: integer
        slowPeriod:
          type: integer
        rsiPeriod:
          type: integer
        rsiOverbought:
          type: integer
        rsiOversold:
          type: integer
        candles:
          type: integer
      required:
        - symbol
        - strategy
        - initialBalance

    BacktestResult:
      type: object
      properties:
        symbol:
          type: string
        strategy:
          type: string
        initialBalance:
          type: number
        finalBalance:
          type: number
        totalPnl:
          type: number
        totalPnlPct:
          type: number
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        winRate:
          type: number
        maxDrawdown:
          type: number
        maxDrawdownPct:
          type: number
        profitFactor:
          type: number
        averageWin:
          type: number
        averageLoss:
          type: number
        trades:
          type: array
          items:
            $ref: "#/components/schemas/BacktestTrade"
        equityCurve:
          type: array
          items:
            $ref: "#/components/schemas/EquityPoint"
      required:
        - symbol
        - strategy
        - initialBalance
        - finalBalance
        - totalPnl
        - totalPnlPct
        - totalTrades
        - winningTrades
        - losingTrades
        - winRate
        - maxDrawdown
        - maxDrawdownPct
        - profitFactor
        - averageWin
        - averageLoss
        - trades
        - equityCurve

    BacktestTrade:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        entryTime:
          type: string
        exitTime:
          type: string
        entryPrice:
          type: number
        exitPrice:
          type: number
        lots:
          type: number
        pnl:
          type: number
        pips:
          type: number
      required:
        - id
        - type
        - entryTime
        - exitTime
        - entryPrice
        - exitPrice
        - lots
        - pnl
        - pips

    EquityPoint:
      type: object
      properties:
        time:
          type: string
        equity:
          type: number
        balance:
          type: number
      required:
        - time
        - equity
        - balance
